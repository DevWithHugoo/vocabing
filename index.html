<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabing</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0ead6;
    --card-bg: #ede5c8;
    --navy: #1a2c4e;
    --green: #7aab8e;
    --green-dark: #5d8f72;
    --text: #1a2c4e;
    --muted: #7a7060;
    --dot-inactive: #b8af98;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* === PHONE FRAME === */
  .phone {
    width: 360px;
    min-height: 680px;
    background: var(--bg);
    border-radius: 40px;
    border: 3px solid #c8bfa4;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.13);
  }

  /* === TOP BAR === */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 24px 10px;
  }

  .icon-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2.5px solid var(--green);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--green);
    transition: background 0.15s;
  }
  .icon-btn:hover { background: rgba(122,171,142,0.12); }
  .icon-btn svg { width: 22px; height: 22px; stroke: var(--green); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .app-title {
    font-size: 30px;
    font-weight: 900;
    color: var(--navy);
    letter-spacing: -0.5px;
  }

  /* === CAROUSEL === */
  .carousel-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 0;
    position: relative;
  }

  .nav-arrow {
    width: 38px;
    height: 50px;
    background: var(--green);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    box-shadow: none;
  }
  .nav-arrow:hover { background: var(--green-dark); }
  .nav-arrow:active { transform: scale(0.95); }
  .nav-arrow svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }

  .card {
    width: 240px;
    background: var(--card-bg);
    border-radius: 26px;
    border: 4px solid var(--navy);
    padding: 28px 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    min-height: 300px;
    justify-content: space-between;
    transition: transform 0.18s, box-shadow 0.18s;
    user-select: none;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(26,44,78,0.13); }
  .card:active { transform: scale(0.98); }

  .card-title {
    font-size: 24px;
    font-weight: 900;
    color: var(--navy);
    text-align: center;
  }
  .card-emoji {
    font-size: 90px;
    line-height: 1;
  }
  .card-count {
    font-size: 15px;
    color: var(--muted);
    font-weight: 700;
  }

  /* === DOTS === */
  .dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    padding: 8px 0 24px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--dot-inactive);
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active { background: var(--navy); transform: scale(1.2); }

  /* === OVERLAY === */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10, 20, 40, 0.75);
    z-index: 20;
    border-radius: 37px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    animation: fadeIn 0.2s ease;
  }
  .overlay.open { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .close-x {
    position: absolute;
    top: 22px;
    right: 26px;
    font-size: 28px;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    font-weight: 800;
    line-height: 1;
    transition: color 0.15s;
  }
  .close-x:hover { color: white; }

  /* === LESSON CARD === */
  .lesson-card {
    width: 288px;
    background: var(--card-bg);
    border-radius: 26px;
    border: 4px solid var(--navy);
    padding: 22px 20px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .q-progress-bar {
    width: 100%;
    height: 6px;
    background: #d0c8b0;
    border-radius: 3px;
  }
  .q-progress-fill {
    height: 100%;
    background: var(--navy);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .q-number {
    font-size: 12px;
    color: var(--muted);
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .q-emoji {
    font-size: 60px;
    line-height: 1.1;
    transition: transform 0.3s;
  }

  .q-counter-wrap {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .q-counter {
    font-size: 40px;
    font-weight: 900;
    color: var(--navy);
    animation: countPulse 0.4s ease;
  }
  @keyframes countPulse { from { transform: scale(1.3); opacity: 0.5; } to { transform: scale(1); opacity: 1; } }

  .q-answer {
    font-size: 24px;
    font-weight: 900;
    color: var(--navy);
    text-align: center;
    display: none;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .q-phonetic {
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
    font-weight: 600;
    display: none;
  }

  .q-next-counter {
    font-size: 13px;
    color: var(--muted);
    font-weight: 700;
    display: none;
    margin-top: 4px;
  }

  /* === DONE OVERLAY === */
  .done-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10, 20, 40, 0.75);
    z-index: 30;
    border-radius: 37px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    animation: fadeIn 0.3s ease;
  }
  .done-overlay.open { display: flex; }

  .done-card {
    width: 280px;
    background: var(--card-bg);
    border-radius: 26px;
    border: 4px solid var(--navy);
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .done-trophy {
    font-size: 72px;
    line-height: 1;
  }

  .done-title {
    font-size: 26px;
    font-weight: 900;
    color: var(--navy);
    text-align: center;
  }

  .done-sub {
    font-size: 15px;
    color: var(--muted);
    font-weight: 700;
    text-align: center;
  }

  .done-btn {
    margin-top: 6px;
    padding: 14px 28px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .done-btn:hover { background: var(--green-dark); }
  .done-btn:active { transform: scale(0.97); }

  /* === SETTINGS OVERLAY === */
  .settings-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10, 20, 40, 0.75);
    z-index: 40;
    border-radius: 37px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    animation: fadeIn 0.2s ease;
  }
  .settings-overlay.open { display: flex; }

  .settings-card {
    width: 280px;
    background: var(--card-bg);
    border-radius: 26px;
    border: 4px solid var(--navy);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .settings-title {
    font-size: 26px;
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .settings-btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .settings-btn:hover { background: var(--green-dark); }
  .settings-btn:active { transform: scale(0.98); }

  .settings-close {
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--navy);
    border: 2.5px solid var(--navy);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .settings-close:hover { background: rgba(26,44,78,0.06); }
  .settings-close:active { transform: scale(0.98); }

  /* === DARK THEME === */
  body.dark {
    --bg: #1a2027;
    --card-bg: #252932;
    --navy: #e8eef5;
    --green: #7aab8e;
    --green-dark: #98c4ab;
    --text: #e8eef5;
    --muted: #9ca3af;
    --dot-inactive: #4a5160;
  }
  body.dark .phone { border-color: #3a4150; }
</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- TOP BAR -->
  <div class="topbar">
    <button class="icon-btn" aria-label="Settings" onclick="openSettings()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <span class="app-title">Vocabing</span>
    <button class="icon-btn" aria-label="Toggle theme" onclick="toggleTheme()">
      <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>

  <!-- CAROUSEL -->
  <div class="carousel-area">
    <button class="nav-arrow" aria-label="Previous" onclick="prevCard()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="card" onclick="openLesson()" id="mainCard">
      <div class="card-title" id="cardTitle">Vegetables</div>
      <div class="card-emoji" id="cardEmoji">🥦</div>
      <div class="card-count" id="cardCount">10 Terms</div>
    </div>
    <button class="nav-arrow" aria-label="Next" onclick="nextCard()">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <!-- DOTS -->
  <div class="dots" id="dots"></div>

  <!-- LESSON OVERLAY -->
  <div class="overlay" id="overlay">
    <span class="close-x" onclick="closeLesson()">✕</span>
    <div class="lesson-card">
      <div class="q-number" id="qNum">1 / 10</div>
      <div class="q-progress-bar"><div class="q-progress-fill" id="progFill" style="width:10%"></div></div>
      <div class="q-emoji" id="qEmoji">🥕</div>
      <div class="q-counter-wrap">
        <div class="q-counter" id="qCounter">3</div>
      </div>
      <div class="q-answer" id="qAnswer"></div>
      <div class="q-phonetic" id="qPhonetic"></div>
      <div class="q-next-counter" id="qNextCounter"></div>
    </div>
  </div>

  <!-- DONE OVERLAY -->
  <div class="done-overlay" id="doneOverlay">
    <div class="done-card">
      <div class="done-trophy">🎉</div>
      <div class="done-title">Series complete!</div>
      <div class="done-sub" id="doneSub">10/10 done</div>
      <button class="done-btn" onclick="closeDone()">Back to menu</button>
    </div>
  </div>

  <!-- SETTINGS OVERLAY -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-card">
      <div class="settings-title">⚙️ Settings</div>
      <button class="settings-btn" onclick="resetProgress()">🔄 Reset all progress</button>
      <button class="settings-close" onclick="closeSettings()">Cancel</button>
    </div>
  </div>

</div>

<script>
const cards = [
  {
    title: "Vegetables",
    emoji: "🥦",
    count: 10,
    words: [
      { emoji: "🫑", en: "Bell pepper",    ph: "/bel ˈpep.ər/" },
      { emoji: "🥦", en: "Broccoli",       ph: "/ˈbrɒk.ə.li/" },
      { emoji: "🥬", en: "Bok choy",       ph: "/bɒk ˈtʃɔɪ/" },
      { emoji: "🍆", en: "Eggplant",       ph: "/ˈeɡ.plænt/" },
      { emoji: "🥒", en: "Cucumber",       ph: "/ˈkjuː.kʌm.bər/" },
      { emoji: "🌶️", en: "Chili pepper",   ph: "/ˈtʃɪl.i ˌpep.ər/" },
      { emoji: "🧄", en: "Garlic",         ph: "/ˈɡɑːr.lɪk/" },
      { emoji: "🫛", en: "Peas",           ph: "/piːz/" },
      { emoji: "🥑", en: "Avocado",        ph: "/ˌæv.əˈkɑː.doʊ/" },
      { emoji: "🫒", en: "Olive",          ph: "/ˈɒl.ɪv/" },
    ]
  },
  {
    title: "Fruits",
    emoji: "🍎",
    count: 10,
    words: [
      { emoji: "🥝", en: "Kiwi",           ph: "/ˈkiː.wiː/" },
      { emoji: "🥭", en: "Mango",          ph: "/ˈmæŋ.ɡoʊ/" },
      { emoji: "🍍", en: "Pineapple",      ph: "/ˈpaɪn.æp.əl/" },
      { emoji: "🫐", en: "Blueberry",      ph: "/ˈbluː.ber.i/" },
      { emoji: "🍇", en: "Grapes",         ph: "/ɡreɪps/" },
      { emoji: "🍓", en: "Strawberry",     ph: "/ˈstrɔː.bər.i/" },
      { emoji: "🍑", en: "Peach",          ph: "/piːtʃ/" },
      { emoji: "🍒", en: "Cherry",         ph: "/ˈtʃer.i/" },
      { emoji: "🍋", en: "Lemon",          ph: "/ˈlem.ən/" },
      { emoji: "🫒", en: "Coconut",        ph: "/ˈkoʊ.kə.nʌt/" },
    ]
  },
  {
    title: "Animals",
    emoji: "🦊",
    count: 10,
    words: [
      { emoji: "🦊", en: "Fox",            ph: "/fɒks/" },
      { emoji: "🦝", en: "Raccoon",        ph: "/ræˈkuːn/" },
      { emoji: "🦦", en: "Otter",          ph: "/ˈɒt.ər/" },
      { emoji: "🦫", en: "Beaver",         ph: "/ˈbiː.vər/" },
      { emoji: "🦔", en: "Hedgehog",       ph: "/ˈhedʒ.hɒɡ/" },
      { emoji: "🦌", en: "Deer",           ph: "/dɪər/" },
      { emoji: "🦙", en: "Llama",          ph: "/ˈlɑː.mə/" },
      { emoji: "🦘", en: "Kangaroo",       ph: "/ˌkæŋ.ɡəˈruː/" },
      { emoji: "🦒", en: "Giraffe",        ph: "/dʒɪˈrɑːf/" },
      { emoji: "🦛", en: "Hippopotamus",   ph: "/ˌhɪp.əˈpɒt.ə.məs/" },
    ]
  },
  {
    title: "Sea Creatures",
    emoji: "🐙",
    count: 10,
    words: [
      { emoji: "🐙", en: "Octopus",        ph: "/ˈɒk.tə.pəs/" },
      { emoji: "🦑", en: "Squid",          ph: "/skwɪd/" },
      { emoji: "🦐", en: "Shrimp",         ph: "/ʃrɪmp/" },
      { emoji: "🦞", en: "Lobster",        ph: "/ˈlɒb.stər/" },
      { emoji: "🦀", en: "Crab",           ph: "/kræb/" },
      { emoji: "🐡", en: "Blowfish",       ph: "/ˈbloʊ.fɪʃ/" },
      { emoji: "🦈", en: "Shark",          ph: "/ʃɑːrk/" },
      { emoji: "🐠", en: "Tropical fish",  ph: "/ˈtrɒp.ɪ.kəl fɪʃ/" },
      { emoji: "🐟", en: "Fish",           ph: "/fɪʃ/" },
      { emoji: "🦭", en: "Seal",           ph: "/siːl/" },
    ]
  }
];

let currentCard = 0;
let currentQ = 0;
let timerA = null, timerB = null;
let dark = false;

function buildDots() {
  const d = document.getElementById('dots');
  d.innerHTML = '';
  cards.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentCard ? ' active' : '');
    d.appendChild(dot);
  });
}

function showCard() {
  document.getElementById('cardTitle').textContent = cards[currentCard].title;
  document.getElementById('cardEmoji').textContent = cards[currentCard].emoji;
  document.getElementById('cardCount').textContent = cards[currentCard].count + ' Terms';
  buildDots();
}

function prevCard() { currentCard = (currentCard - 1 + cards.length) % cards.length; showCard(); }
function nextCard() { currentCard = (currentCard + 1) % cards.length; showCard(); }

function openLesson() {
  currentQ = 0;
  document.getElementById('overlay').classList.add('open');
  showQuestion();
}

function closeLesson() {
  clearTimeout(timerA);
  clearTimeout(timerB);
  document.getElementById('overlay').classList.remove('open');
}

function showQuestion() {
  const words = cards[currentCard].words;
  const v = words[currentQ];

  document.getElementById('qNum').textContent = (currentQ + 1) + ' / ' + words.length;
  document.getElementById('progFill').style.width = ((currentQ + 1) / words.length * 100) + '%';
  document.getElementById('qEmoji').textContent = v.emoji;

  const ansEl = document.getElementById('qAnswer');
  const phEl = document.getElementById('qPhonetic');
  const nextEl = document.getElementById('qNextCounter');
  const ctrEl = document.getElementById('qCounter');

  ansEl.style.display = 'none';
  phEl.style.display = 'none';
  nextEl.style.display = 'none';
  ctrEl.style.display = 'block';

  // Countdown 3 → 2 → 1 then reveal answer
  let count = 3;
  ctrEl.textContent = count;
  ctrEl.style.animation = 'none';
  void ctrEl.offsetWidth;
  ctrEl.style.animation = 'countPulse 0.4s ease';

  clearTimeout(timerA);
  clearTimeout(timerB);

  function tick() {
    count--;
    if (count > 0) {
      ctrEl.textContent = count;
      ctrEl.style.animation = 'none';
      void ctrEl.offsetWidth;
      ctrEl.style.animation = 'countPulse 0.4s ease';
      timerA = setTimeout(tick, 1000);
    } else {
      // Reveal answer
      ctrEl.style.display = 'none';
      ansEl.textContent = v.en;
      ansEl.style.display = 'block';
      phEl.textContent = v.ph;
      phEl.style.display = 'block';

      // Auto-advance countdown 3 → 2 → 1
      let next = 3;
      nextEl.textContent = 'Next in ' + next + '…';
      nextEl.style.display = 'block';

      function tickNext() {
        next--;
        if (next > 0) {
          nextEl.textContent = 'Next in ' + next + '…';
          timerB = setTimeout(tickNext, 1000);
        } else {
          nextEl.style.display = 'none';
          advanceQuestion();
        }
      }
      timerB = setTimeout(tickNext, 1000);
    }
  }

  timerA = setTimeout(tick, 1000);
}

function advanceQuestion() {
  const total = cards[currentCard].words.length;
  if (currentQ < total - 1) {
    currentQ++;
    showQuestion();
  } else {
    closeLesson();
    const done = document.getElementById('doneOverlay');
    document.getElementById('doneSub').textContent = total + '/' + total + ' done — ' + cards[currentCard].title;
    done.classList.add('open');
  }
}

function closeDone() {
  document.getElementById('doneOverlay').classList.remove('open');
}

function toggleTheme() {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  const icon = document.getElementById('themeIcon');
  if (dark) {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
}

function openSettings() { document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function resetProgress() {
  closeSettings();
  alert('Progress reset! 🔄');
}

buildDots();
showCard();
</script>
