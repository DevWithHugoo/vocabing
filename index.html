<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabing</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0ead6;
    --card-bg: #ede5c8;
    --navy: #1a2c4e;
    --green: #7aab8e;
    --green-dark: #5d8f72;
    --muted: #7a7060;
    --dot-inactive: #b8af98;
  }

  html, body {
    height: 100%;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
  }

  /* =====================
     LAYOUT
  ===================== */
  .phone {
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* On desktop: constrain to a nice centred column */
  @media (min-width: 700px) {
    body { display: flex; align-items: stretch; justify-content: center; }
    .phone {
      width: min(520px, 90vw);
      min-height: 100vh;
      box-shadow: 0 0 60px rgba(0,0,0,0.10);
    }
  }

  /* =====================
     TOP BAR
  ===================== */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: clamp(16px, 4vw, 32px) clamp(16px, 5vw, 36px) clamp(8px, 2vw, 14px);
    flex-shrink: 0;
  }

  .icon-btn {
    width: clamp(38px, 8vw, 50px);
    height: clamp(38px, 8vw, 50px);
    border-radius: 50%;
    border: 2.5px solid var(--green);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: rgba(122,171,142,0.12); }
  .icon-btn svg {
    width: clamp(18px, 4vw, 24px);
    height: clamp(18px, 4vw, 24px);
    stroke: var(--green);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .app-title {
    font-size: clamp(24px, 6vw, 36px);
    font-weight: 900;
    color: var(--navy);
    letter-spacing: -0.5px;
  }

  /* =====================
     CAROUSEL
  ===================== */
  .carousel-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 3vw, 30px) 0 clamp(16px, 4vw, 30px);
  }

  .carousel-row {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .nav-arrow {
    width: clamp(36px, 8vw, 50px);
    height: clamp(48px, 11vw, 68px);
    background: var(--green);
    border: none;
    border-radius: clamp(8px, 2vw, 12px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    margin: 0 clamp(12px, 3vw, 28px);
  }
  .nav-arrow:hover { background: var(--green-dark); }
  .nav-arrow:active { transform: scale(0.95); }
  .nav-arrow svg {
    width: clamp(18px, 4vw, 26px);
    height: clamp(18px, 4vw, 26px);
    stroke: white;
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* =====================
     MENU CARD
  ===================== */
  .card {
    width: clamp(200px, 55vw, 300px);
    background: var(--card-bg);
    border-radius: clamp(18px, 4vw, 28px);
    border: clamp(3px, 0.7vw, 5px) solid var(--navy);
    padding: clamp(20px, 5vw, 36px) clamp(16px, 4vw, 28px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(8px, 2vw, 16px);
    cursor: pointer;
    min-height: clamp(240px, 45vw, 360px);
    justify-content: space-between;
    transition: transform 0.18s, box-shadow 0.18s;
    user-select: none;
  }
  .card:hover { transform: translateY(-5px); box-shadow: 0 10px 28px rgba(26,44,78,0.14); }
  .card:active { transform: scale(0.98); }

  .card-title {
    font-size: clamp(18px, 4.5vw, 28px);
    font-weight: 900;
    color: var(--navy);
    text-align: center;
  }
  .card-emoji {
    font-size: clamp(64px, 16vw, 110px);
    line-height: 1;
  }
  .card-count {
    font-size: clamp(12px, 3vw, 17px);
    color: var(--muted);
    font-weight: 700;
  }

  /* =====================
     DOTS
  ===================== */
  .dots {
    display: flex;
    gap: clamp(6px, 1.5vw, 10px);
    justify-content: center;
    margin-top: clamp(14px, 3vw, 24px);
    flex-wrap: wrap;
    padding: 0 16px;
  }
  .dot {
    width: clamp(7px, 1.8vw, 11px);
    height: clamp(7px, 1.8vw, 11px);
    border-radius: 50%;
    background: var(--dot-inactive);
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active { background: var(--navy); transform: scale(1.25); }

  /* =====================
     LESSON OVERLAY
  ===================== */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 20, 40, 0.75);
    z-index: 20;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    animation: fadeIn 0.2s ease;
  }
  .overlay.open { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .close-x {
    position: absolute;
    top: clamp(16px, 4vw, 28px);
    right: clamp(20px, 5vw, 32px);
    font-size: clamp(22px, 5vw, 32px);
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    font-weight: 800;
    line-height: 1;
    transition: color 0.15s;
  }
  .close-x:hover { color: white; }

  /* =====================
     LESSON CARD
  ===================== */
  .lesson-card {
    width: clamp(260px, 80vw, 380px);
    background: var(--card-bg);
    border-radius: clamp(18px, 4vw, 28px);
    border: clamp(3px, 0.7vw, 5px) solid var(--navy);
    padding: clamp(18px, 4vw, 30px) clamp(18px, 4vw, 30px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(8px, 2vw, 14px);
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .q-progress-bar {
    width: 100%;
    height: clamp(5px, 1.2vw, 8px);
    background: #d0c8b0;
    border-radius: 4px;
  }
  .q-progress-fill {
    height: 100%;
    background: var(--navy);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .q-number {
    font-size: clamp(10px, 2.5vw, 13px);
    color: var(--muted);
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .q-emoji {
    font-size: clamp(48px, 12vw, 80px);
    line-height: 1.1;
  }

  .q-counter-wrap {
    height: clamp(44px, 10vw, 64px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .q-counter {
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 900;
    color: var(--navy);
    animation: countPulse 0.4s ease;
  }
  @keyframes countPulse { from { transform: scale(1.3); opacity: 0.5; } to { transform: scale(1); opacity: 1; } }

  .q-answer {
    font-size: clamp(20px, 5vw, 30px);
    font-weight: 900;
    color: var(--navy);
    text-align: center;
    display: none;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .q-phonetic {
    font-size: clamp(12px, 3vw, 16px);
    color: var(--muted);
    font-style: italic;
    font-weight: 600;
    display: none;
    text-align: center;
  }

  .q-next-counter {
    font-size: clamp(11px, 2.8vw, 14px);
    color: var(--muted);
    font-weight: 700;
    display: none;
    margin-top: 2px;
  }

  /* =====================
     DONE OVERLAY
  ===================== */
  .done-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 20, 40, 0.80);
    z-index: 30;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    animation: fadeIn 0.3s ease;
  }
  .done-overlay.open { display: flex; }

  .done-card {
    width: clamp(240px, 75vw, 340px);
    background: var(--card-bg);
    border-radius: clamp(18px, 4vw, 28px);
    border: clamp(3px, 0.7vw, 5px) solid var(--navy);
    padding: clamp(24px, 6vw, 40px) clamp(20px, 5vw, 32px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(10px, 2.5vw, 18px);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .done-trophy { font-size: clamp(52px, 13vw, 80px); line-height: 1; }

  .done-title {
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 900;
    color: var(--navy);
    text-align: center;
  }

  .done-sub {
    font-size: clamp(13px, 3vw, 16px);
    color: var(--muted);
    font-weight: 700;
    text-align: center;
  }

  .done-btn {
    margin-top: 4px;
    padding: clamp(10px, 2.5vw, 16px) clamp(22px, 6vw, 36px);
    background: var(--green);
    color: white;
    border: none;
    border-radius: clamp(10px, 2.5vw, 14px);
    font-size: clamp(14px, 3.5vw, 18px);
    font-weight: 800;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: background 0.15s, transform 0.1s;
  }
  .done-btn:hover { background: var(--green-dark); }
  .done-btn:active { transform: scale(0.97); }

  /* =====================
     SETTINGS OVERLAY
  ===================== */
  .settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 20, 40, 0.75);
    z-index: 40;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    animation: fadeIn 0.2s ease;
  }
  .settings-overlay.open { display: flex; }

  .settings-card {
    width: clamp(240px, 75vw, 340px);
    background: var(--card-bg);
    border-radius: clamp(18px, 4vw, 28px);
    border: clamp(3px, 0.7vw, 5px) solid var(--navy);
    padding: clamp(20px, 5vw, 34px) clamp(18px, 4vw, 28px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(10px, 2.5vw, 16px);
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .settings-title {
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 4px;
  }

  .settings-btn {
    width: 100%;
    padding: clamp(11px, 2.8vw, 16px);
    background: var(--green);
    color: white;
    border: none;
    border-radius: clamp(10px, 2.5vw, 14px);
    font-size: clamp(13px, 3.3vw, 16px);
    font-weight: 800;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: background 0.15s, transform 0.1s;
  }
  .settings-btn:hover { background: var(--green-dark); }
  .settings-btn:active { transform: scale(0.98); }

  .settings-close {
    width: 100%;
    padding: clamp(11px, 2.8vw, 16px);
    background: transparent;
    color: var(--navy);
    border: 2.5px solid var(--navy);
    border-radius: clamp(10px, 2.5vw, 14px);
    font-size: clamp(13px, 3.3vw, 16px);
    font-weight: 800;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: background 0.15s;
  }
  .settings-close:hover { background: rgba(26,44,78,0.06); }

  /* =====================
     DARK THEME
  ===================== */
  body.dark {
    --bg: #1a2027;
    --card-bg: #252932;
    --navy: #e8eef5;
    --green: #7aab8e;
    --green-dark: #98c4ab;
    --muted: #9ca3af;
    --dot-inactive: #4a5160;
  }
</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- TOP BAR -->
  <div class="topbar">
    <button class="icon-btn" aria-label="Settings" onclick="openSettings()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <span class="app-title">Vocabing</span>
    <button class="icon-btn" aria-label="Toggle theme" onclick="toggleTheme()">

    </button>
  </div>

  <!-- CAROUSEL -->
  <div class="carousel-area">
    <div class="carousel-row">
      <button class="nav-arrow" aria-label="Previous" onclick="prevCard()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="card" onclick="openLesson()" id="mainCard">
        <div class="card-title" id="cardTitle">Vegetables</div>
        <div class="card-emoji" id="cardEmoji">🥦</div>
        <div class="card-count" id="cardCount">10 Terms</div>
      </div>
      <button class="nav-arrow" aria-label="Next" onclick="nextCard()">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="dots" id="dots"></div>
  </div>

  <!-- LESSON OVERLAY -->
  <div class="overlay" id="overlay">
    <span class="close-x" onclick="closeLesson()">✕</span>
    <div class="lesson-card">
      <div class="q-number" id="qNum">1 / 10</div>
      <div class="q-progress-bar"><div class="q-progress-fill" id="progFill" style="width:10%"></div></div>
      <div class="q-emoji" id="qEmoji">🥕</div>
      <div class="q-counter-wrap">
        <div class="q-counter" id="qCounter">3</div>
      </div>
      <div class="q-answer" id="qAnswer"></div>
      <div class="q-phonetic" id="qPhonetic"></div>
      <div class="q-next-counter" id="qNextCounter"></div>
    </div>
  </div>

  <!-- DONE OVERLAY -->
  <div class="done-overlay" id="doneOverlay">
    <div class="done-card">
      <div class="done-trophy">🎉</div>
      <div class="done-title">Series complete!</div>
      <div class="done-sub" id="doneSub">10/10 done</div>
      <button class="done-btn" onclick="closeDone()">Back to menu</button>
    </div>
  </div>

  <!-- SETTINGS OVERLAY -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-card">
      <div class="settings-title">⚙️ Settings</div>
      <button class="settings-btn" onclick="resetProgress()">🔄 Reset all progress</button>
      <button class="settings-close" onclick="closeSettings()">Cancel</button>
    </div>
  </div>

</div>

let currentCard = 0;
let currentQ = 0;
let timerA = null, timerB = null;
let dark = false;

function buildDots() {
  const d = document.getElementById('dots');
  d.innerHTML = '';
  cards.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentCard ? ' active' : '');
    d.appendChild(dot);
  });
}

function showCard() {
  document.getElementById('cardTitle').textContent = cards[currentCard].title;
  document.getElementById('cardEmoji').textContent = cards[currentCard].emoji;
  document.getElementById('cardCount').textContent = cards[currentCard].count + ' Terms';
  buildDots();
}

function prevCard() { currentCard = (currentCard - 1 + cards.length) % cards.length; showCard(); }
function nextCard() { currentCard = (currentCard + 1) % cards.length; showCard(); }

function openLesson() {
  currentQ = 0;
  document.getElementById('overlay').classList.add('open');
  showQuestion();
}

function closeLesson() {
  clearTimeout(timerA);
  clearTimeout(timerB);
  document.getElementById('overlay').classList.remove('open');
}

function showQuestion() {
  const words = cards[currentCard].words;
  const v = words[currentQ];

  document.getElementById('qNum').textContent = (currentQ + 1) + ' / ' + words.length;
  document.getElementById('progFill').style.width = ((currentQ + 1) / words.length * 100) + '%';
  document.getElementById('qEmoji').textContent = v.emoji;

  const ansEl = document.getElementById('qAnswer');
  const phEl = document.getElementById('qPhonetic');
  const nextEl = document.getElementById('qNextCounter');
  const ctrEl = document.getElementById('qCounter');

  ansEl.style.display = 'none';
  phEl.style.display = 'none';
  nextEl.style.display = 'none';
  ctrEl.style.display = 'block';

  // Countdown 3 → 2 → 1 then reveal answer
  let count = 3;
  ctrEl.textContent = count;
  ctrEl.style.animation = 'none';
  void ctrEl.offsetWidth;
  ctrEl.style.animation = 'countPulse 0.4s ease';

  clearTimeout(timerA);
  clearTimeout(timerB);

  function tick() {
    count--;
    if (count > 0) {
      ctrEl.textContent = count;
      ctrEl.style.animation = 'none';
      void ctrEl.offsetWidth;
      ctrEl.style.animation = 'countPulse 0.4s ease';
      timerA = setTimeout(tick, 1000);
    } else {
      // Reveal answer
      ctrEl.style.display = 'none';
      ansEl.textContent = v.en;
      ansEl.style.display = 'block';
      phEl.textContent = v.ph;
      phEl.style.display = 'block';

      // Auto-advance countdown 2 → 1
      let next = 2;
      nextEl.textContent = 'Next in ' + next + '…';
      nextEl.style.display = 'block';

      function tickNext() {
        next--;
        if (next > 0) {
          nextEl.textContent = 'Next in ' + next + '…';
          timerB = setTimeout(tickNext, 1000);
        } else {
          nextEl.style.display = 'none';
          advanceQuestion();
        }
      }
      timerB = setTimeout(tickNext, 1000);
    }
  }

  timerA = setTimeout(tick, 1000);
}

function advanceQuestion() {
  const total = cards[currentCard].words.length;
  if (currentQ < total - 1) {
    currentQ++;
    showQuestion();
  } else {
    closeLesson();
    const done = document.getElementById('doneOverlay');
    document.getElementById('doneSub').textContent = total + '/' + total + ' done — ' + cards[currentCard].title;
    done.classList.add('open');
  }
}

function closeDone() {
  document.getElementById('doneOverlay').classList.remove('open');
}

function toggleTheme() {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  const icon = document.getElementById('themeIcon');
  if (dark) {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
}

function openSettings() { document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function resetProgress() {
  closeSettings();
  alert('Progress reset! 🔄');
}
